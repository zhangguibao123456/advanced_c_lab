repos:
  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        entry: clang-format --dry-run --Werror
        language: system
        files: \.(c|h)$
      - id: cmake-build
        name: cmake build
        entry: bash scripts/check.sh
        language: system
        pass_filenames: false
      - id: no-tabs
        name: no tab indentation
        entry: bash -lc '! grep -RIn "	" src CMakeLists.txt'
        language: system
        pass_filenames: false
